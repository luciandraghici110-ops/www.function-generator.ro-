<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graficator de Funcții</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/13.0.0/math.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0f; --panel: #111118; --border: #222230;
    --accent: #00e5ff; --accent2: #ff4d6d; --text: #e8e8f0; --muted: #555570;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Space Mono',monospace; min-height:100vh; display:flex; flex-direction:column; overflow:hidden; }
  header { padding:12px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; background:var(--panel); }
  header .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.2rem; letter-spacing:-0.03em; color:var(--accent); }
  header .logo span { color:var(--text); }
  header .tagline { font-size:0.65rem; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; }
  .app { display:flex; flex:1; overflow:hidden; }
  .sidebar { width:280px; min-width:280px; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
  .sidebar-section { padding:14px; border-bottom:1px solid var(--border); }
  .sidebar-section label { display:block; font-size:0.62rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .input-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .func-color { width:16px; height:16px; border-radius:50%; flex-shrink:0; border:2px solid var(--border); }
  .func-input { flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text); font-family:'Space Mono',monospace; font-size:0.85rem; padding:8px 10px; border-radius:6px; outline:none; transition:border-color 0.2s; -webkit-appearance:none; }
  .func-input:focus { border-color:var(--accent); }
  .func-input.error { border-color:var(--accent2); }
  .func-list { display:flex; flex-direction:column; gap:6px; }
  .func-item { background:var(--bg); border:1px solid var(--border); border-radius:6px; font-size:0.8rem; transition:all 0.15s; }
  .func-item:hover { border-color:var(--muted); }
  .func-item-row { display:flex; align-items:center; gap:8px; padding:8px 10px; cursor:pointer; }
  .func-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .func-expr { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text); }
  .func-edit { background:none; border:1px solid var(--border); color:var(--muted); cursor:pointer; font-size:0.8rem; padding:4px 8px; border-radius:4px; transition:all 0.15s; flex-shrink:0; }
  .func-edit:hover { border-color:var(--accent); color:var(--accent); }
  .func-del { background:none; border:1px solid var(--border); color:var(--muted); cursor:pointer; font-size:0.9rem; padding:4px 8px; border-radius:4px; transition:all 0.15s; flex-shrink:0; }
  .func-del:hover { border-color:var(--accent2); color:var(--accent2); }
  .func-item.hidden { opacity:0.4; }
  .edit-row { display:flex; gap:6px; padding:0 10px 10px; }
  .edit-input { flex:1; background:var(--bg); border:1px solid var(--accent); color:var(--text); font-family:'Space Mono',monospace; font-size:0.8rem; padding:6px 8px; border-radius:6px; outline:none; min-width:0; -webkit-appearance:none; }
  .edit-input.error { border-color:var(--accent2); }
  .edit-save { background:var(--accent); border:none; color:var(--bg); font-family:'Space Mono',monospace; font-size:0.72rem; padding:6px 12px; border-radius:6px; cursor:pointer; font-weight:700; flex-shrink:0; }
  .edit-cancel { background:none; border:1px solid var(--border); color:var(--muted); font-family:'Space Mono',monospace; font-size:0.72rem; padding:6px 10px; border-radius:6px; cursor:pointer; flex-shrink:0; }
  .btn { background:none; border:1px solid var(--border); color:var(--text); font-family:'Space Mono',monospace; font-size:0.75rem; padding:8px 14px; border-radius:6px; cursor:pointer; transition:all 0.15s; }
  .btn:hover { border-color:var(--accent); color:var(--accent); }
  .btn.primary { border-color:var(--accent); color:var(--accent); }
  .btn.primary:hover { background:var(--accent); color:var(--bg); }
  .range-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .range-field { display:flex; flex-direction:column; gap:4px; }
  .range-field span { font-size:0.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; }
  .range-field input { background:var(--bg); border:1px solid var(--border); color:var(--text); font-family:'Space Mono',monospace; font-size:0.8rem; padding:6px 8px; border-radius:6px; outline:none; width:100%; -webkit-appearance:none; }
  .range-field input:focus { border-color:var(--accent); }
  .hint-box { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:10px 12px; font-size:0.68rem; color:var(--muted); line-height:1.7; }
  .hint-box strong { color:var(--text); }
  .sidebar-scroll { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px; }
  .sidebar-scroll::-webkit-scrollbar { width:4px; }
  .sidebar-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
  .err-msg { font-size:0.68rem; color:var(--accent2); margin-top:4px; min-height:14px; }
  .canvas-wrap { flex:1; position:relative; overflow:hidden; background:var(--bg); }
  canvas { display:block; cursor:crosshair; touch-action:none; }
  .coords-display { position:absolute; bottom:12px; right:12px; background:rgba(17,17,24,0.9); border:1px solid var(--border); border-radius:6px; padding:5px 10px; font-size:0.7rem; color:var(--muted); pointer-events:none; }
  .coords-display span { color:var(--accent); }
  .zoom-controls { position:absolute; bottom:12px; left:12px; display:flex; flex-direction:column; gap:4px; }
  .zoom-btn { width:32px; height:32px; background:rgba(17,17,24,0.9); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
  .zoom-btn:hover { border-color:var(--accent); color:var(--accent); }
  .reset-btn { width:32px; height:32px; background:rgba(17,17,24,0.9); border:1px solid var(--border); border-radius:6px; color:var(--muted); font-size:0.6rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; font-family:'Space Mono',monospace; }
  .reset-btn:hover { border-color:var(--accent); color:var(--accent); }
  @media (max-width:900px) {
    body { overflow:hidden; }
    .app { flex-direction:row; height:calc(100vh - 50px); }
    .sidebar { width:260px; min-width:260px; max-height:unset; height:100%; border-right:1px solid var(--border); border-bottom:none; }
    .sidebar-scroll { max-height:unset; }
    .canvas-wrap { height:100%; min-height:unset; }
    .func-input, .range-field input, .btn { font-size:14px; }
  }
  .mathkeys {
  display: none;
}
@media (max-width: 900px) {
  .mathkeys {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .mathkey {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .mathkey:active { background: var(--accent); color: var(--bg); }
}
.toggle-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 1.1rem;
  width: 28px;
  height: 28px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
.sidebar.collapsed { width: 0; min-width: 0; overflow: hidden; border: none; }
.sidebar.collapsed * { display: none; }
</style>
</head>
<body>
<header>
  <div>
    <div class="logo">f(x)<span>.</span>ro</div>
    <button class="toggle-btn" id="toggleBtn" onclick="toggleSidebar()">‹</button>
    <div class="tagline">Graficator de Funcții Matematice</div>
  </div>
</header>
<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <label>Adaugă funcție</label>
      <div class="input-row">
        <div class="func-color" id="newFuncColor" style="background:#00e5ff"></div>
        <input class="func-input" id="funcInput" type="text" placeholder="ex: sin(x), x^2+y^2=1" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
      </div>
      <div class="err-msg" id="errMsg"></div>
      <button class="btn primary" onclick="addFunction()" style="width:100%">+ Adaugă</button>
    </div>
   <div class="sidebar-section">
      <label>Domeniu X</label>
      <div class="range-row">
        <div class="range-field"><span>X min</span><input type="number" id="xMin" value="-10" step="1"></div>
        <div class="range-field"><span>X max</span><input type="number" id="xMax" value="10" step="1"></div>
      </div>
      <label style="margin-top:10px">Domeniu Y</label>
      <div class="range-row">
        <div class="range-field"><span>Y min</span><input type="number" id="yMin" value="-8" step="1"></div>
        <div class="range-field"><span>Y max</span><input type="number" id="yMax" value="8" step="1"></div>
      </div>
    </div>
    <div class="sidebar-section">
      <label>Funcții adăugate</label>
      <div class="func-list" id="funcList">
        <div style="font-size:0.72rem;color:var(--muted)">Nicio funcție adăugată.</div>
      </div>
    </div>
    <div class="sidebar-scroll">
      <div class="hint-box">
        <strong>Funcții explicite:</strong><br>
        sin(x), cos(x), x^2, 1/x<br>
        sqrt(x), log(x), exp(x)<br><br>
        <strong>Ecuații implicite:</strong><br>
        x^2 + y^2 = 1<br>
        (x^2+y^2-1)^3 = x^2*y^3<br>
        x^2 - y^2 = 1<br><br>
        <strong>Constante:</strong> pi, e, π<br>
        <strong>Acceptă:</strong> ln, tg, arctg, ×, ÷, ²
      </div>
      <button class="btn" onclick="clearAll()" style="width:100%">🗑 Șterge tot</button>
    </div>
  </div>
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="graph"></canvas>
    <div class="coords-display">x: <span id="cx">—</span> &nbsp; y: <span id="cy">—</span></div>
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="zoom(0.7)">+</button>
      <button class="zoom-btn" onclick="zoom(1.3)">−</button>
      <button class="reset-btn" onclick="resetView()">↺</button>
    </div>
  </div>
</div>
<script>
const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');

let funcs = [], view = {xMin:-10,xMax:10,yMin:-8,yMax:8};
let dragging = false, dragStart = null, viewAtDrag = null;
const COLORS = ['#00e5ff','#ff4d6d','#a8ff78','#ffd166','#b388ff','#ff9a3c','#64ffda','#ff6b9d'];
let colorIdx = 0;

function nextColor() {
  const c = COLORS[colorIdx % COLORS.length];
  colorIdx++;
  document.getElementById('newFuncColor').style.background = COLORS[colorIdx % COLORS.length];
  return c;
}

function normalizeExpr(raw) {
  let e = raw.trim().toLowerCase();
  e = e.replace(/÷/g, '/');
  e = e.replace(/×/g, '*');
  e = e.replace(/·/g, '*');
  e = e.replace(/−/g, '-');
  e = e.replace(/–/g, '-');
  e = e.replace(/\u2212/g, '-');
  e = e.replace(/²/g, '^2');
  e = e.replace(/³/g, '^3');
  e = e.replace(/⁴/g, '^4');
  e = e.replace(/⁵/g, '^5');
  e = e.replace(/⁻¹/g, '^(-1)');
  e = e.replace(/π/g, 'pi');
  e = e.replace(/∞/g, 'Infinity');
  e = e.replace(/\btg\(/g, 'tan(');
  e = e.replace(/\barctg\(/g, 'atan(');
  e = e.replace(/\barcsin\(/g, 'asin(');
  e = e.replace(/\barccos\(/g, 'acos(');
  e = e.replace(/\barctan\(/g, 'atan(');
  e = e.replace(/\bln\(/g, 'log(');
  e = e.replace(/\blg\(/g, 'log10(');
  e = e.replace(/(\d)([a-df-wyz])/g, '$1*$2');
  e = e.replace(/(\d)\(/g, '$1*(');
  e = e.replace(/\)(\d)/g, ')*$1');
  e = e.replace(/\)([a-df-wyz])/g, ')*$1');
  return e;
}

function isImplicit(expr) {
  // are = si contine y
  return expr.includes('=') && /y/.test(expr);
}

function parseImplicit(expr) {
  // transforma "lhs = rhs" in "lhs - (rhs)"
  const parts = expr.split('=');
  if (parts.length !== 2) return null;
  return `(${parts[0]}) - (${parts[1]})`;
}
function insertKey(val) {
  const input = document.getElementById('funcInput');
  const start = input.selectionStart;
  const end = input.selectionEnd;
  const text = input.value;
  input.value = text.slice(0, start) + val + text.slice(end);
  input.selectionStart = input.selectionEnd = start + val.length;
  input.focus();
}
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const btn = document.getElementById('toggleBtn');
  sidebar.classList.toggle('collapsed');
  btn.textContent = sidebar.classList.contains('collapsed') ? '›' : '‹';
  setTimeout(resize, 300);
}
function resize() {
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  adjustYRange();
  draw();
}

function adjustYRange() {
  const aspect = canvas.height / canvas.width;
  const xRange = view.xMax - view.xMin;
  const yRange = xRange * aspect;
  const cx = (view.yMin + view.yMax) / 2;
  view.yMin = cx - yRange / 2;
  view.yMax = cx + yRange / 2;
}

window.addEventListener('resize', resize);

function toCanvas(x, y) {
  return [
    (x - view.xMin) / (view.xMax - view.xMin) * canvas.width,
    canvas.height - (y - view.yMin) / (view.yMax - view.yMin) * canvas.height
  ];
}

function toWorld(px, py) {
  return [
    view.xMin + px / canvas.width * (view.xMax - view.xMin),
    view.yMin + (canvas.height - py) / canvas.height * (view.yMax - view.yMin)
  ];
}

function draw(fast = false) {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0,0,W,H);
  drawGrid();
  drawAxes();
  funcs.forEach(f => {
    if (!f.visible) return;
    if (f.implicit) drawImplicit(f, fast);
    else drawFunc(f);
  });
}

function drawGrid() {
  const W = canvas.width, H = canvas.height;
  const step = niceStep((view.xMax - view.xMin) / 10);
  ctx.strokeStyle = '#1a1a2a'; ctx.lineWidth = 1;
  let x0 = Math.ceil(view.xMin / step) * step;
  for (let x = x0; x <= view.xMax; x += step) {
    const [px] = toCanvas(x, 0);
    ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,H); ctx.stroke();
  }
  const stepY = niceStep((view.yMax - view.yMin) / 8);
  let y0 = Math.ceil(view.yMin / stepY) * stepY;
  for (let y = y0; y <= view.yMax; y += stepY) {
    const [,py] = toCanvas(0, y);
    ctx.beginPath(); ctx.moveTo(0,py); ctx.lineTo(W,py); ctx.stroke();
  }
  ctx.fillStyle = '#333350'; ctx.font = '10px Space Mono,monospace';
  ctx.textAlign = 'center';
  for (let x = x0; x <= view.xMax; x += step) {
    if (Math.abs(x) < step * 0.01) continue;
    const [px,py] = toCanvas(x,0);
    ctx.fillText(fmt(x), px, Math.max(12, Math.min(H-4, py+14)));
  }
  ctx.textAlign = 'right';
  for (let y = y0; y <= view.yMax; y += stepY) {
    if (Math.abs(y) < stepY * 0.01) continue;
    const [px,py] = toCanvas(0,y);
    ctx.fillText(fmt(y), Math.max(30, Math.min(W-4, px-6)), py+4);
  }
}

function drawAxes() {
  const W = canvas.width, H = canvas.height;
  ctx.strokeStyle = '#2a2a3f'; ctx.lineWidth = 1.5;
  const [ox,oy] = toCanvas(0,0);
  if (oy >= 0 && oy <= H) { ctx.beginPath(); ctx.moveTo(0,oy); ctx.lineTo(W,oy); ctx.stroke(); }
  if (ox >= 0 && ox <= W) { ctx.beginPath(); ctx.moveTo(ox,0); ctx.lineTo(ox,H); ctx.stroke(); }
  ctx.fillStyle = '#333350'; ctx.font = '10px Space Mono,monospace'; ctx.textAlign = 'right';
  ctx.fillText('0', Math.max(30,Math.min(W-4,ox-4)), Math.max(12,Math.min(H-4,oy+14)));
}

function drawFunc(f) {
  const W = canvas.width, steps = W * 2;
  const dx = (view.xMax - view.xMin) / steps;
  ctx.strokeStyle = f.color; ctx.lineWidth = 2.2;
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  let started = false;
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const x = view.xMin + i * dx;
    let y;
    try {
      y = f.compiled.evaluate({x});
      if (typeof y !== 'number' || isNaN(y) || !isFinite(y)) { started = false; continue; }
    } catch { started = false; continue; }
    if (started) {
      let prevY;
      try { prevY = f.compiled.evaluate({x: view.xMin + (i-1)*dx}); } catch { prevY = NaN; }
      if (Math.abs(y - prevY) > (view.yMax - view.yMin) * 2) { started = false; }
    }
    const [px,py] = toCanvas(x,y);
    if (!started) { ctx.moveTo(px,py); started = true; } else ctx.lineTo(px,py);
  }
  ctx.stroke();
}

function drawImplicit(f, fast = false) {
  // Marching squares - contour la 0
  const W = canvas.width, H = canvas.height;
const GRID = fast ? 80 : 400;
  const dx = (view.xMax - view.xMin) / GRID;
  const dy = (view.yMax - view.yMin) / GRID;

  ctx.strokeStyle = f.color;
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.beginPath();

  // evaluam valorile pe grid
  const vals = [];
  for (let j = 0; j <= GRID; j++) {
    vals[j] = [];
    for (let i = 0; i <= GRID; i++) {
      const x = view.xMin + i * dx;
      const y = view.yMin + j * dy;
      try {
        const v = f.compiled.evaluate({x, y});
        vals[j][i] = (typeof v === 'number' && isFinite(v)) ? v : NaN;
      } catch { vals[j][i] = NaN; }
    }
  }

  // marching squares
  for (let j = 0; j < GRID; j++) {
    for (let i = 0; i < GRID; i++) {
      const v00 = vals[j][i];
      const v10 = vals[j][i+1];
      const v01 = vals[j+1][i];
      const v11 = vals[j+1][i+1];
      if (isNaN(v00)||isNaN(v10)||isNaN(v01)||isNaN(v11)) continue;

      const x0 = view.xMin + i * dx;
      const x1 = view.xMin + (i+1) * dx;
      const y0 = view.yMin + j * dy;
      const y1 = view.yMin + (j+1) * dy;

      // interpolare liniara pe muchii
      function interp(va, vb, a, b) {
        if (Math.abs(vb - va) < 1e-10) return (a + b) / 2;
        return a + (0 - va) / (vb - va) * (b - a);
      }

      const points = [];
      // muchia de jos (j, i -> i+1)
      if ((v00 < 0) !== (v10 < 0)) points.push([interp(v00,v10,x0,x1), y0]);
      // muchia dreapta (i+1, j -> j+1)
      if ((v10 < 0) !== (v11 < 0)) points.push([x1, interp(v10,v11,y0,y1)]);
      // muchia de sus (j+1, i -> i+1)
      if ((v01 < 0) !== (v11 < 0)) points.push([interp(v01,v11,x0,x1), y1]);
      // muchia stanga (i, j -> j+1)
      if ((v00 < 0) !== (v01 < 0)) points.push([x0, interp(v00,v01,y0,y1)]);

      if (points.length >= 2) {
        const [px0,py0] = toCanvas(points[0][0], points[0][1]);
        const [px1,py1] = toCanvas(points[1][0], points[1][1]);
        ctx.moveTo(px0,py0);
        ctx.lineTo(px1,py1);
      }
    }
  }
  ctx.stroke();
}

function niceStep(raw) {
  const pow = Math.pow(10, Math.floor(Math.log10(raw)));
  const norm = raw / pow;
  if (norm < 1.5) return pow;
  if (norm < 3.5) return 2 * pow;
  if (norm < 7.5) return 5 * pow;
  return 10 * pow;
}

function fmt(n) {
  if (Number.isInteger(n)) return n.toString();
  return parseFloat(n.toPrecision(4)).toString();
}

function addFunction() {
  const input = document.getElementById('funcInput');
  const errMsg = document.getElementById('errMsg');
  const raw = normalizeExpr(input.value);
  if (!raw) return;

  let compiled, implicit = false, displayExpr = raw;

  if (isImplicit(raw)) {
    // ecuatie implicita
    implicit = true;
    const implExpr = parseImplicit(raw);
    if (!implExpr) { errMsg.textContent = 'Eroare: ecuație invalidă.'; input.classList.add('error'); return; }
    try {
      compiled = math.compile(implExpr);
      compiled.evaluate({x:0, y:0});
    } catch(e) { errMsg.textContent = 'Eroare: ecuație invalidă.'; input.classList.add('error'); return; }
  } else {
    // functie explicita y = f(x)
    try {
      compiled = math.compile(raw);
      compiled.evaluate({x:0});
    } catch(e) { errMsg.textContent = 'Eroare: expresie invalidă.'; input.classList.add('error'); return; }
  }

  errMsg.textContent = ''; input.classList.remove('error');
  const color = nextColor();
  funcs.push({id: Date.now(), expr: displayExpr, compiled, color, visible: true, implicit});
  input.value = '';
  renderFuncList();
  draw();
}

document.getElementById('funcInput').addEventListener('keydown', e => { if (e.key === 'Enter') addFunction(); });
document.getElementById('funcInput').addEventListener('input', () => {
  document.getElementById('errMsg').textContent = '';
  document.getElementById('funcInput').classList.remove('error');
});

function renderFuncList() {
  const list = document.getElementById('funcList');
  if (funcs.length === 0) { list.innerHTML = '<div style="font-size:0.72rem;color:var(--muted)">Nicio funcție adăugată.</div>'; return; }
  list.innerHTML = funcs.map(f => `
    <div class="func-item ${f.visible?'':'hidden'}" data-id="${f.id}">
      <div class="func-item-row" onclick="toggleFunc(${f.id})">
        <div class="func-dot" style="background:${f.color}"></div>
        <div class="func-expr" title="${f.expr}">${f.implicit ? '⊂ ' : ''}${f.expr}</div>
        <button class="func-edit" onclick="event.stopPropagation();startEdit(${f.id})">✎</button>
        <button class="func-del" onclick="event.stopPropagation();removeFunc(${f.id})">×</button>
      </div>
    </div>
  `).join('');
}

function toggleFunc(id) { const f=funcs.find(f=>f.id===id); if(f){f.visible=!f.visible;renderFuncList();draw();} }
function removeFunc(id) { funcs=funcs.filter(f=>f.id!==id); renderFuncList(); draw(); }

function startEdit(id) {
  const f = funcs.find(f=>f.id===id); if(!f)return;
  cancelEdit();
  const item = document.querySelector(`[data-id="${id}"]`); if(!item)return;
  const row = document.createElement('div'); row.className='edit-row';
  row.innerHTML = `<input class="edit-input" id="editInput-${id}" value="${f.expr}" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"><button class="edit-save" onclick="saveEdit(${id})">OK</button><button class="edit-cancel" onclick="cancelEdit()">✕</button>`;
  item.appendChild(row);
  const inp = document.getElementById(`editInput-${id}`);
  inp.focus();
  inp.addEventListener('keydown', e => { if(e.key==='Enter')saveEdit(id); if(e.key==='Escape')cancelEdit(); });
}

function saveEdit(id) {
  const input = document.getElementById(`editInput-${id}`); if(!input)return;
  const raw = normalizeExpr(input.value); if(!raw)return;
  let compiled, implicit = false;
  if (isImplicit(raw)) {
    implicit = true;
    const implExpr = parseImplicit(raw);
    if (!implExpr) { input.classList.add('error'); return; }
    try { compiled = math.compile(implExpr); compiled.evaluate({x:0,y:0}); } catch { input.classList.add('error'); return; }
  } else {
    try { compiled = math.compile(raw); compiled.evaluate({x:0}); } catch { input.classList.add('error'); return; }
  }
  const f = funcs.find(f=>f.id===id);
  if(f) { f.expr=raw; f.compiled=compiled; f.implicit=implicit; }
  cancelEdit(); renderFuncList(); draw();
}

function cancelEdit() { document.querySelectorAll('.edit-row').forEach(r=>r.remove()); }

function clearAll() { funcs=[]; colorIdx=0; document.getElementById('newFuncColor').style.background=COLORS[0]; renderFuncList(); draw(); }

document.getElementById('xMin').addEventListener('change', () => {
  const xMin=parseFloat(document.getElementById('xMin').value), xMax=parseFloat(document.getElementById('xMax').value);
  if(!isNaN(xMin)&&!isNaN(xMax)&&xMin<xMax){view.xMin=xMin;view.xMax=xMax;draw();}
});
document.getElementById('yMin').addEventListener('change', () => {
  const yMin = parseFloat(document.getElementById('yMin').value);
  const yMax = parseFloat(document.getElementById('yMax').value);
  if (!isNaN(yMin) && !isNaN(yMax) && yMin < yMax) {
    view.yMin = yMin; view.yMax = yMax; draw();
  }
});
document.getElementById('yMax').addEventListener('change', () => {
  const yMin = parseFloat(document.getElementById('yMin').value);
  const yMax = parseFloat(document.getElementById('yMax').value);
  if (!isNaN(yMin) && !isNaN(yMax) && yMin < yMax) {
    view.yMin = yMin; view.yMax = yMax; draw();
  }
});
document.getElementById('xMax').addEventListener('change', () => {
  const xMin=parseFloat(document.getElementById('xMin').value), xMax=parseFloat(document.getElementById('xMax').value);
  if(!isNaN(xMin)&&!isNaN(xMax)&&xMin<xMax){view.xMin=xMin;view.xMax=xMax;draw();}
});

canvas.addEventListener('mousemove', e => {
  const rect=canvas.getBoundingClientRect(), px=e.clientX-rect.left, py=e.clientY-rect.top;
  const [wx,wy]=toWorld(px,py);
  document.getElementById('cx').textContent=wx.toFixed(3);
  document.getElementById('cy').textContent=wy.toFixed(3);
  if(dragging&&dragStart){
    const xRange=viewAtDrag.xMax-viewAtDrag.xMin, yRange=viewAtDrag.yMax-viewAtDrag.yMin;
    view.xMin=viewAtDrag.xMin-(px-dragStart.px)/canvas.width*xRange;
    view.xMax=viewAtDrag.xMax-(px-dragStart.px)/canvas.width*xRange;
    view.yMin=viewAtDrag.yMin+(py-dragStart.py)/canvas.height*yRange;
    view.yMax=viewAtDrag.yMax+(py-dragStart.py)/canvas.height*yRange;
    draw(true);
  }
});
canvas.addEventListener('mousedown', e => {
  dragging=true; const rect=canvas.getBoundingClientRect();
  dragStart={px:e.clientX-rect.left,py:e.clientY-rect.top}; viewAtDrag={...view}; canvas.style.cursor='grabbing';
});
canvas.addEventListener('mouseup', ()=>{dragging=false;canvas.style.cursor='crosshair';draw();});
canvas.addEventListener('mouseleave', ()=>{dragging=false;canvas.style.cursor='crosshair';});
canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect(), [wx,wy]=toWorld(e.clientX-rect.left,e.clientY-rect.top);
  const factor=e.deltaY>0?1.12:0.88;
  view.xMin=wx+(view.xMin-wx)*factor; view.xMax=wx+(view.xMax-wx)*factor;
  view.yMin=wy+(view.yMin-wy)*factor; view.yMax=wy+(view.yMax-wy)*factor;
  draw(true);
  clearTimeout(window._zoomTimer);
  window._zoomTimer = setTimeout(()=>draw(), 150);
},{passive:false});

let lastTouchDist=null;
canvas.addEventListener('touchstart', e=>{
  if(e.touches.length===1){dragging=true;dragStart={px:e.touches[0].clientX,py:e.touches[0].clientY};viewAtDrag={...view};}
  else if(e.touches.length===2){dragging=false;lastTouchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
},{passive:true});
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(e.touches.length===1&&dragging&&dragStart){
    const dx=e.touches[0].clientX-dragStart.px, dy=e.touches[0].clientY-dragStart.py;
    const xRange=viewAtDrag.xMax-viewAtDrag.xMin, yRange=viewAtDrag.yMax-viewAtDrag.yMin;
    view.xMin=viewAtDrag.xMin-dx/canvas.width*xRange; view.xMax=viewAtDrag.xMax-dx/canvas.width*xRange;
    view.yMin=viewAtDrag.yMin+dy/canvas.height*yRange; view.yMax=viewAtDrag.yMax+dy/canvas.height*yRange; draw(true);
  } else if(e.touches.length===2&&lastTouchDist){
    const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const factor=lastTouchDist/dist, cx=(view.xMin+view.xMax)/2, cy=(view.yMin+view.yMax)/2;
    const xRange=(view.xMax-view.xMin)*factor, yRange=(view.yMax-view.yMin)*factor;
    view.xMin=cx-xRange/2; view.xMax=cx+xRange/2; view.yMin=cy-yRange/2; view.yMax=cy+yRange/2; lastTouchDist=dist; draw(true);
  }
},{passive:false});
canvas.addEventListener('touchend', ()=>{dragging=false;lastTouchDist=null;draw();});

function zoom(factor){
  const cx=(view.xMin+view.xMax)/2, cy=(view.yMin+view.yMax)/2;
  const xRange=(view.xMax-view.xMin)*factor, yRange=(view.yMax-view.yMin)*factor;
  view.xMin=cx-xRange/2; view.xMax=cx+xRange/2; view.yMin=cy-yRange/2; view.yMax=cy+yRange/2;
  draw(true);
  clearTimeout(window._zoomTimer);
  window._zoomTimer = setTimeout(()=>draw(), 150);
}

function resetView(){ view={xMin:-10,xMax:10,yMin:-8,yMax:8}; adjustYRange(); draw(); }

resize();
</script>
