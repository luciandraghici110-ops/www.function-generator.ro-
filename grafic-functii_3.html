<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graficator de Funcții</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/13.0.0/math.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #111118;
    --border: #222230;
    --accent: #00e5ff;
    --accent2: #ff4d6d;
    --accent3: #a8ff78;
    --text: #e8e8f0;
    --muted: #555570;
    --grid: #1a1a2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--panel);
  }

  header .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    letter-spacing: -0.03em;
    color: var(--accent);
  }

  header .logo span { color: var(--text); }

  header .tagline {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .app {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 300px;
    min-width: 300px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-section {
    padding: 18px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-section label {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .func-color {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 2px solid var(--border);
  }

  .func-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    padding: 7px 10px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s;
  }

  .func-input:focus { border-color: var(--accent); }
  .func-input.error { border-color: var(--accent2); }

  .func-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .func-item {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }

  .func-item:hover { border-color: var(--muted); }

  .func-item .func-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .func-item .func-expr {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
  }

  .func-item .func-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 0 2px;
    transition: color 0.15s;
  }
  .func-item .func-del:hover { color: var(--accent2); }

  .func-item.hidden { opacity: 0.4; }

  .btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { border-color: var(--accent); color: var(--accent); }
  .btn.primary:hover { background: var(--accent); color: var(--bg); }

  .range-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .range-field { display: flex; flex-direction: column; gap: 4px; }
  .range-field span { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .range-field input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    padding: 6px 8px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .range-field input:focus { border-color: var(--accent); }

  .hint-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 0.7rem;
    color: var(--muted);
    line-height: 1.7;
  }

  .hint-box strong { color: var(--text); }

  .sidebar-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .sidebar-scroll::-webkit-scrollbar { width: 4px; }
  .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
  .sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .err-msg {
    font-size: 0.7rem;
    color: var(--accent2);
    margin-top: 4px;
    min-height: 14px;
  }

  /* CANVAS AREA */
  .canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }

  canvas {
    display: block;
    cursor: crosshair;
  }

  .coords-display {
    position: absolute;
    bottom: 16px;
    right: 16px;
    background: rgba(17,17,24,0.9);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 0.72rem;
    color: var(--muted);
    backdrop-filter: blur(8px);
    pointer-events: none;
  }

  .coords-display span { color: var(--accent); }

  .zoom-controls {
    position: absolute;
    bottom: 16px;
    left: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .zoom-btn {
    width: 32px; height: 32px;
    background: rgba(17,17,24,0.9);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    backdrop-filter: blur(8px);
  }
  .zoom-btn:hover { border-color: var(--accent); color: var(--accent); }

  .reset-btn {
    width: 32px; height: 32px;
    background: rgba(17,17,24,0.9);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 0.6rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    backdrop-filter: blur(8px);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.05em;
  }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  .empty-hint {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    text-align: center;
    pointer-events: none;
  }
  .empty-hint h2 {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    color: var(--border);
    letter-spacing: -0.04em;
  }
  .empty-hint p {
    color: var(--muted);
    font-size: 0.75rem;
    margin-top: 6px;
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">f(x)<span>.</span>ro</div>
    <div class="tagline">Graficator de Funcții Matematice</div>
  </div>
</header>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      <label>Adaugă funcție</label>
      <div class="input-row">
        <div class="func-color" id="newFuncColor" style="background:#00e5ff"></div>
        <input class="func-input" id="funcInput" type="text" placeholder="ex: sin(x), x^2, log(x)" autocomplete="off" spellcheck="false">
      </div>
      <div class="err-msg" id="errMsg"></div>
      <button class="btn primary" onclick="addFunction()" style="width:100%">+ Adaugă</button>
    </div>

    <div class="sidebar-section">
      <label>Domeniu X</label>
      <div class="range-row">
        <div class="range-field">
          <span>X min</span>
          <input type="number" id="xMin" value="-10" step="1">
        </div>
        <div class="range-field">
          <span>X max</span>
          <input type="number" id="xMax" value="10" step="1">
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <label>Funcții adăugate</label>
      <div class="func-list" id="funcList">
        <div style="font-size:0.72rem;color:var(--muted)">Nicio funcție adăugată.</div>
      </div>
    </div>

    <div class="sidebar-scroll">
      <div class="hint-box">
        <strong>Exemple de funcții:</strong><br>
        sin(x), cos(x), tan(x)<br>
        x^2, x^3 - 2*x<br>
        sqrt(x), abs(x)<br>
        log(x), exp(x)<br>
        1/x, floor(x)<br><br>
        <strong>Constante:</strong> pi, e<br>
        <strong>Combinații:</strong> sin(x)*e^(-x/5)
      </div>
      <button class="btn" onclick="clearAll()" style="width:100%">🗑 Șterge tot</button>
    </div>
  </div>

  <!-- CANVAS -->
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="graph"></canvas>

    <div class="coords-display" id="coordsDisplay">
      x: <span id="cx">—</span> &nbsp; y: <span id="cy">—</span>
    </div>
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="zoom(0.7)">+</button>
      <button class="zoom-btn" onclick="zoom(1.3)">−</button>
      <button class="reset-btn" onclick="resetView()">↺</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');

// State
let funcs = [];
let view = { xMin: -10, xMax: 10, yMin: -8, yMax: 8 };
let dragging = false, dragStart = null, viewAtDrag = null;

const COLORS = ['#00e5ff','#ff4d6d','#a8ff78','#ffd166','#b388ff','#ff9a3c','#64ffda','#ff6b9d'];
let colorIdx = 0;

function nextColor() {
  const c = COLORS[colorIdx % COLORS.length];
  colorIdx++;
  document.getElementById('newFuncColor').style.background = COLORS[colorIdx % COLORS.length];
  return c;
}

// Resize
function resize() {
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  adjustYRange();
  draw();
}

function adjustYRange() {
  const aspect = canvas.height / canvas.width;
  const xRange = view.xMax - view.xMin;
  const yRange = xRange * aspect;
  const cx = (view.yMin + view.yMax) / 2;
  view.yMin = cx - yRange / 2;
  view.yMax = cx + yRange / 2;
}

window.addEventListener('resize', resize);

// Coordinate transforms
function toCanvas(x, y) {
  return [
    (x - view.xMin) / (view.xMax - view.xMin) * canvas.width,
    canvas.height - (y - view.yMin) / (view.yMax - view.yMin) * canvas.height
  ];
}

function toWorld(px, py) {
  return [
    view.xMin + px / canvas.width * (view.xMax - view.xMin),
    view.yMin + (canvas.height - py) / canvas.height * (view.yMax - view.yMin)
  ];
}

// Draw
function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  drawGrid();
  drawAxes();
  funcs.forEach(f => { if (f.visible) drawFunc(f); });
}

function drawGrid() {
  const W = canvas.width, H = canvas.height;
  const xRange = view.xMax - view.xMin;
  const yRange = view.yMax - view.yMin;

  const step = niceStep(xRange / 10);

  ctx.strokeStyle = '#1a1a2a';
  ctx.lineWidth = 1;

  let x0 = Math.ceil(view.xMin / step) * step;
  for (let x = x0; x <= view.xMax; x += step) {
    const [px] = toCanvas(x, 0);
    ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, H); ctx.stroke();
  }

  const stepY = niceStep(yRange / 8);
  let y0 = Math.ceil(view.yMin / stepY) * stepY;
  for (let y = y0; y <= view.yMax; y += stepY) {
    const [, py] = toCanvas(0, y);
    ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(W, py); ctx.stroke();
  }

  // Labels
  ctx.fillStyle = '#333350';
  ctx.font = '10px Space Mono, monospace';
  ctx.textAlign = 'center';
  for (let x = x0; x <= view.xMax; x += step) {
    if (Math.abs(x) < step * 0.01) continue;
    const [px, py] = toCanvas(x, 0);
    const labelY = Math.max(12, Math.min(H - 4, py + 14));
    ctx.fillText(fmt(x), px, labelY);
  }

  ctx.textAlign = 'right';
  for (let y = y0; y <= view.yMax; y += stepY) {
    if (Math.abs(y) < stepY * 0.01) continue;
    const [px, py] = toCanvas(0, y);
    const labelX = Math.max(30, Math.min(W - 4, px - 6));
    ctx.fillText(fmt(y), labelX, py + 4);
  }
}

function drawAxes() {
  const W = canvas.width, H = canvas.height;
  ctx.strokeStyle = '#2a2a3f';
  ctx.lineWidth = 1.5;

  const [ox, oy] = toCanvas(0, 0);

  // X axis
  if (oy >= 0 && oy <= H) {
    ctx.beginPath(); ctx.moveTo(0, oy); ctx.lineTo(W, oy); ctx.stroke();
  }
  // Y axis
  if (ox >= 0 && ox <= W) {
    ctx.beginPath(); ctx.moveTo(ox, 0); ctx.lineTo(ox, H); ctx.stroke();
  }

  // Origin label
  ctx.fillStyle = '#333350';
  ctx.font = '10px Space Mono, monospace';
  ctx.textAlign = 'right';
  const lx = Math.max(30, Math.min(W - 4, ox - 4));
  const ly = Math.max(12, Math.min(H - 4, oy + 14));
  ctx.fillText('0', lx, ly);
}

function drawFunc(f) {
  const W = canvas.width;
  const steps = W * 2;
  const dx = (view.xMax - view.xMin) / steps;

  ctx.strokeStyle = f.color;
  ctx.lineWidth = 2.2;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';

  let started = false;
  ctx.beginPath();

  for (let i = 0; i <= steps; i++) {
    const x = view.xMin + i * dx;
    let y;
    try {
      y = f.compiled.evaluate({ x });
      if (typeof y !== 'number' || isNaN(y) || !isFinite(y)) { started = false; continue; }
    } catch { started = false; continue; }

    // Discontinuity detection
    if (started) {
      const prevX = view.xMin + (i - 1) * dx;
      let prevY;
      try { prevY = f.compiled.evaluate({ x: prevX }); } catch { prevY = NaN; }
      if (Math.abs(y - prevY) > (view.yMax - view.yMin) * 2) {
        started = false;
      }
    }

    const [px, py] = toCanvas(x, y);
    if (!started) { ctx.moveTo(px, py); started = true; }
    else ctx.lineTo(px, py);
  }
  ctx.stroke();
}

// Helpers
function niceStep(raw) {
  const pow = Math.pow(10, Math.floor(Math.log10(raw)));
  const norm = raw / pow;
  if (norm < 1.5) return pow;
  if (norm < 3.5) return 2 * pow;
  if (norm < 7.5) return 5 * pow;
  return 10 * pow;
}

function fmt(n) {
  if (Number.isInteger(n)) return n.toString();
  return parseFloat(n.toPrecision(4)).toString();
}

// Add function
function addFunction() {
  const input = document.getElementById('funcInput');
  const errMsg = document.getElementById('errMsg');
  const expr = input.value.trim();
  if (!expr) return;

  let compiled;
  try {
    compiled = math.compile(expr);
    compiled.evaluate({ x: 0 }); // test
  } catch (e) {
    errMsg.textContent = 'Eroare: expresie invalidă.';
    input.classList.add('error');
    return;
  }

  errMsg.textContent = '';
  input.classList.remove('error');

  const color = nextColor();
  const f = { id: Date.now(), expr, compiled, color, visible: true };
  funcs.push(f);
  input.value = '';
  renderFuncList();

  draw();
}

document.getElementById('funcInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addFunction();
});

document.getElementById('funcInput').addEventListener('input', () => {
  document.getElementById('errMsg').textContent = '';
  document.getElementById('funcInput').classList.remove('error');
});

function renderFuncList() {
  const list = document.getElementById('funcList');
  if (funcs.length === 0) {
    list.innerHTML = '<div style="font-size:0.72rem;color:var(--muted)">Nicio funcție adăugată.</div>';
    return;
  }
  list.innerHTML = funcs.map(f => `
    <div class="func-item ${f.visible ? '' : 'hidden'}" onclick="toggleFunc(${f.id})">
      <div class="func-dot" style="background:${f.color}"></div>
      <div class="func-expr" title="${f.expr}">${f.expr}</div>
      <button class="func-del" onclick="event.stopPropagation();removeFunc(${f.id})">×</button>
    </div>
  `).join('');
}

function toggleFunc(id) {
  const f = funcs.find(f => f.id === id);
  if (f) { f.visible = !f.visible; renderFuncList(); draw(); }
}

function removeFunc(id) {
  funcs = funcs.filter(f => f.id !== id);
  renderFuncList();
  draw();
}

function clearAll() {
  funcs = [];
  colorIdx = 0;
  document.getElementById('newFuncColor').style.background = COLORS[0];
  renderFuncList();
  draw();
}

// Domain inputs
document.getElementById('xMin').addEventListener('change', () => {
  const xMin = parseFloat(document.getElementById('xMin').value);
  const xMax = parseFloat(document.getElementById('xMax').value);
  if (!isNaN(xMin) && !isNaN(xMax) && xMin < xMax) {
    view.xMin = xMin; view.xMax = xMax;
    adjustYRange(); draw();
  }
});
document.getElementById('xMax').addEventListener('change', () => {
  const xMin = parseFloat(document.getElementById('xMin').value);
  const xMax = parseFloat(document.getElementById('xMax').value);
  if (!isNaN(xMin) && !isNaN(xMax) && xMin < xMax) {
    view.xMin = xMin; view.xMax = xMax;
    adjustYRange(); draw();
  }
});

// Mouse
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const px = e.clientX - rect.left;
  const py = e.clientY - rect.top;
  const [wx, wy] = toWorld(px, py);
  document.getElementById('cx').textContent = wx.toFixed(3);
  document.getElementById('cy').textContent = wy.toFixed(3);

  if (dragging && dragStart) {
    const [dx, dy] = [px - dragStart.px, py - dragStart.py];
    const xRange = viewAtDrag.xMax - viewAtDrag.xMin;
    const yRange = viewAtDrag.yMax - viewAtDrag.yMin;
    const dxW = dx / canvas.width * xRange;
    const dyW = dy / canvas.height * yRange;
    view.xMin = viewAtDrag.xMin - dxW;
    view.xMax = viewAtDrag.xMax - dxW;
    view.yMin = viewAtDrag.yMin + dyW;
    view.yMax = viewAtDrag.yMax + dyW;
    draw();
  }
});

canvas.addEventListener('mousedown', e => {
  dragging = true;
  const rect = canvas.getBoundingClientRect();
  dragStart = { px: e.clientX - rect.left, py: e.clientY - rect.top };
  viewAtDrag = { ...view };
  canvas.style.cursor = 'grabbing';
});

canvas.addEventListener('mouseup', () => { dragging = false; canvas.style.cursor = 'crosshair'; });
canvas.addEventListener('mouseleave', () => { dragging = false; canvas.style.cursor = 'crosshair'; });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const [wx, wy] = toWorld(mx, my);
  const factor = e.deltaY > 0 ? 1.12 : 0.88;
  view.xMin = wx + (view.xMin - wx) * factor;
  view.xMax = wx + (view.xMax - wx) * factor;
  view.yMin = wy + (view.yMin - wy) * factor;
  view.yMax = wy + (view.yMax - wy) * factor;
  draw();
}, { passive: false });

// Touch support
let lastTouchDist = null;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragging = true;
    dragStart = { px: e.touches[0].clientX, py: e.touches[0].clientY };
    viewAtDrag = { ...view };
  } else if (e.touches.length === 2) {
    dragging = false;
    lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging && dragStart) {
    const dx = e.touches[0].clientX - dragStart.px;
    const dy = e.touches[0].clientY - dragStart.py;
    const xRange = viewAtDrag.xMax - viewAtDrag.xMin;
    const yRange = viewAtDrag.yMax - viewAtDrag.yMin;
    view.xMin = viewAtDrag.xMin - dx / canvas.width * xRange;
    view.xMax = viewAtDrag.xMax - dx / canvas.width * xRange;
    view.yMin = viewAtDrag.yMin + dy / canvas.height * yRange;
    view.yMax = viewAtDrag.yMax + dy / canvas.height * yRange;
    draw();
  } else if (e.touches.length === 2 && lastTouchDist) {
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    const factor = lastTouchDist / dist;
    const cx = (view.xMin + view.xMax) / 2;
    const cy = (view.yMin + view.yMax) / 2;
    const xRange = (view.xMax - view.xMin) * factor;
    const yRange = (view.yMax - view.yMin) * factor;
    view.xMin = cx - xRange / 2; view.xMax = cx + xRange / 2;
    view.yMin = cy - yRange / 2; view.yMax = cy + yRange / 2;
    lastTouchDist = dist;
    draw();
  }
}, { passive: false });

canvas.addEventListener('touchend', () => { dragging = false; lastTouchDist = null; });

function zoom(factor) {
  const cx = (view.xMin + view.xMax) / 2;
  const cy = (view.yMin + view.yMax) / 2;
  const xRange = (view.xMax - view.xMin) * factor;
  const yRange = (view.yMax - view.yMin) * factor;
  view.xMin = cx - xRange / 2; view.xMax = cx + xRange / 2;
  view.yMin = cy - yRange / 2; view.yMax = cy + yRange / 2;
  draw();
}

function resetView() {
  view = { xMin: -10, xMax: 10, yMin: -8, yMax: 8 };
  adjustYRange();
  draw();
}

// Init
resize();
</script>
